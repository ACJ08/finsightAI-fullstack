# render.yaml - Render.com Deployment Configuration
# This file configures both backend and frontend services for Render.com deployment
# Push this file to your GitHub repo and Render will auto-detect and use it

services:
  # Backend API Service
  - type: web
    name: finsight-api
    runtime: node
    region: ohio  # Change to your preferred region
    buildCommand: cd backend && npm install
    startCommand: node backend/app.js
    envVars:
      # Environment variables for backend. Set secret/runtime values in Render Dashboard.
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://finsight-frontend-561p.onrender.com
      - key: LOG_LEVEL
        value: info

  # Frontend Static Site served by a lightweight Node process (blueprint validators
  # accept 'web' type reliably). This will build the frontend and serve the
  # generated `frontend/dist` directory using `npx serve` so the static files
  # are available on Render. If you prefer a native Render static site, set up
  # the static site manually in the Render dashboard.
  - type: web
    name: finsight-frontend
    runtime: node
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    # Use npx serve to publish the built `dist` folder. Render provides PORT.
    startCommand: npx serve -s frontend/dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://finsight-api-rvll.onrender.com/api
        scope: build
    # Optional: configure caching headers at CDN level in the Render dashboard
    # rather than in the service itself when using a web service to serve
    # static content.

  # PostgreSQL Database (Optional - currently using MongoDB Atlas)
  # Uncomment if you want to migrate from MongoDB to PostgreSQL
  # - type: pserv
  #   name: finsight-db
  #   runtime: postgres15
  #   plan: free
  #   ipAllowList: []  # Allow all

  # Redis Cache (Optional - for future scaling)
  # - type: redis
  #   name: finsight-cache
  #   runtime: redis
  #   plan: free
  #   ipAllowList: []  # Allow all
